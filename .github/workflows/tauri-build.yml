name: Tauri Build

permissions:
  contents: write

on:
  release:
    types: [published]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: '--features self-updater'
          - platform: windows-latest
            args: '--features self-updater'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: pnpm einrichten
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Rust einrichten
        uses: dtolnay/rust-toolchain@stable

      - name: Linux – System-Abhängigkeiten installieren
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Frontend-Abhängigkeiten installieren
        working-directory: GlucoTray
        run: pnpm install

      - name: Tauri Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: GlucoTray
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: "See CHANGELOG for details."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}